<!DOCTYPE html>
<html>

<head>

<title>Solutecno AI Platform</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0f172a;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.status{
margin-bottom:10px;
font-size:16px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e4ed8;
}

.agent{
padding:10px;
border-bottom:1px solid #eee;
}

.conversation{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<header>

Solutecno AI Platform

</header>

<div class="container">

<div class="card">

<h2>Estado del sistema</h2>

<div class="status">
Bot IA: <span id="bot">verificando...</span>
</div>

<div class="status">
Ollama IA: <span id="ollama">verificando...</span>
</div>

<div class="status">
Evolution API: <span id="evolution">verificando...</span>
</div>

</div>


<div class="card">

<h2>Agentes IA</h2>

<div id="agents"></div>

</div>


<div class="card">

<h2>Crear agente</h2>

<input id="name" placeholder="Nombre agente">

<textarea id="prompt" placeholder="Prompt IA"></textarea>

<button onclick="crearAgente()">Guardar agente</button>

</div>


<!-- NUEVO BLOQUE: CONVERSACIONES -->

<div class="card">

<h2>Conversaciones</h2>

<div id="conversations">Cargando conversaciones...</div>

</div>


</div>


<script>

async function status(){

try{

const res = await fetch("/status")
const data = await res.json()

document.getElementById("bot").innerText=data.bot
document.getElementById("ollama").innerText=data.ollama
document.getElementById("evolution").innerText=data.evolution

}catch(e){

console.log(e)

}

}

async function cargarAgentes(){

try{

const res = await fetch("/agents")
const data = await res.json()

let html=""

data.forEach(a=>{

html += `<div class="agent"><b>${a.name}</b><br>${a.prompt}</div>`

})

document.getElementById("agents").innerHTML=html

}catch(e){

console.log(e)

}

}

async function crearAgente(){

const name=document.getElementById("name").value
const prompt=document.getElementById("prompt").value

if(!name || !prompt){

alert("Completa todos los campos")
return

}

await fetch("/agents",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name:name,prompt:prompt})

})

document.getElementById("name").value=""
document.getElementById("prompt").value=""

cargarAgentes()

}


// NUEVA FUNCION PARA CONVERSACIONES

async function cargarConversaciones(){

try{

const res = await fetch("/conversations")
const data = await res.json()

let html=""

data.slice().reverse().forEach(c=>{

html += `
<div class="conversation">
<b>${c.cliente}</b><br>
Cliente: ${c.mensaje}<br>
Bot: ${c.respuesta}
</div>
`

})

document.getElementById("conversations").innerHTML=html

}catch(e){

console.log(e)

}

}


setInterval(status,3000)

status()
cargarAgentes()
cargarConversaciones()

setInterval(cargarConversaciones,3000)

</script>

</body>
</html>
