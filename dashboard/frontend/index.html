<!DOCTYPE html>
<html>

<head>

<title>Solutecno AI Platform</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
display:flex;
height:100vh;
}

header{
background:#0f172a;
color:white;
padding:15px;
font-size:20px;
position:fixed;
top:0;
width:100%;
}

.main{
display:flex;
width:100%;
margin-top:60px;
}

/* panel clientes */

.clients{
width:25%;
background:white;
border-right:1px solid #ddd;
overflow:auto;
}

.client{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.client:hover{
background:#f5f5f5;
}

/* chat */

.chat{
flex:1;
padding:20px;
overflow:auto;
}

.message{
margin-bottom:10px;
}

.bot{
color:green;
}

.top{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e4ed8;
}

</style>

</head>

<body>

<header>

Solutecno AI Platform

</header>


<div class="main">

<div class="clients">

<div class="top">

<h3>Clientes</h3>

<div id="clientsList"></div>

</div>

</div>


<div class="chat">

<div class="card">

<h2>Estado del sistema</h2>

Bot IA: <span id="bot"></span><br>
Ollama: <span id="ollama"></span><br>
Evolution: <span id="evolution"></span>

</div>

<div class="card">

<h2>Agentes IA</h2>

<div id="agents"></div>

</div>

<div class="card">

<h2>Crear agente</h2>

<input id="name" placeholder="Nombre agente">

<textarea id="prompt" placeholder="Prompt IA"></textarea>

<button onclick="crearAgente()">Guardar agente</button>

</div>

<div class="card">

<h2>Chat</h2>

<div id="chatMessages"></div>

</div>

</div>

</div>

<script>

let conversations=[]
let currentClient=null

async function status(){

const res=await fetch("/status")
const data=await res.json()

document.getElementById("bot").innerText=data.bot
document.getElementById("ollama").innerText=data.ollama
document.getElementById("evolution").innerText=data.evolution

}

async function cargarAgentes(){

const res=await fetch("/agents")
const data=await res.json()

let html=""

data.forEach((a,i)=>{

html+=`

<div>

<b>${a.name}</b><br>

${a.prompt}

<br><br>

<button onclick="editarAgente(${i})">Editar</button>
<button onclick="eliminarAgente(${i})">Eliminar</button>

</div>

<hr>

`

})

document.getElementById("agents").innerHTML=html

}

async function editarAgente(id){

const name=prompt("Nuevo nombre agente")
const promptIA=prompt("Nuevo prompt")

await fetch("/agents/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name,prompt:promptIA})
})

cargarAgentes()

}

async function eliminarAgente(id){

if(!confirm("Eliminar agente?")) return

await fetch("/agents/"+id,{
method:"DELETE"
})

cargarAgentes()

}

async function crearAgente(){

const name=document.getElementById("name").value
const prompt=document.getElementById("prompt").value

await fetch("/agents",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,prompt})
})

document.getElementById("name").value=""
document.getElementById("prompt").value=""

cargarAgentes()

}

async function loadConversations(){

const res=await fetch("/conversations")

conversations=await res.json()

const clients={}

conversations.forEach(c=>{
clients[c.cliente]=true
})

const list=document.getElementById("clientsList")

list.innerHTML=""

Object.keys(clients).forEach(c=>{

list.innerHTML+=`
<div class="client" onclick="openChat('${c}')">
${c}
</div>
`

})

}

function openChat(cliente){

currentClient=cliente

const chat=document.getElementById("chatMessages")

chat.innerHTML=""

conversations
.filter(c=>c.cliente===cliente)
.forEach(c=>{

chat.innerHTML+=`

<div class="message">
<b>Cliente:</b> ${c.mensaje}
</div>

<div class="message bot">
<b>Bot:</b> ${c.respuesta}
</div>

`

})

}

setInterval(status,3000)
setInterval(loadConversations,3000)

status()
cargarAgentes()
loadConversations()

</script>

</body>
</html>
